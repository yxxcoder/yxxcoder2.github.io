<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔞 变态指数测试 | HENTAI Index Test</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');

        :root {
            --primary: #ff2d55;
            --primary-dark: #d4234a;
            --bg-dark: #0a0a0f;
            --bg-card: #16161f;
            --bg-card-hover: #1e1e2a;
            --text-primary: #ffffff;
            --text-secondary: #8e8ea0;
            --accent-purple: #bf5af2;
            --accent-blue: #5e5ce6;
            --accent-orange: #ff9f0a;
            --accent-green: #30d158;
            --gradient-hot: linear-gradient(135deg, #ff2d55, #ff6b35, #ff9500);
            --gradient-purple: linear-gradient(135deg, #bf5af2, #5e5ce6);
            --gradient-dark: linear-gradient(135deg, #1a1a2e, #16213e);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== Animated Background ===== */
        .bg-animation {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 20s infinite ease-in-out;
        }

        .bg-animation .orb:nth-child(1) {
            width: 400px; height: 400px;
            background: var(--primary);
            top: -100px; left: -100px;
            animation-delay: 0s;
        }

        .bg-animation .orb:nth-child(2) {
            width: 300px; height: 300px;
            background: var(--accent-purple);
            top: 50%; right: -100px;
            animation-delay: -7s;
        }

        .bg-animation .orb:nth-child(3) {
            width: 350px; height: 350px;
            background: var(--accent-blue);
            bottom: -100px; left: 30%;
            animation-delay: -14s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(50px, -30px) scale(1.1); }
            50% { transform: translate(-30px, 50px) scale(0.9); }
            75% { transform: translate(40px, 20px) scale(1.05); }
        }

        /* ===== Container ===== */
        .container {
            position: relative;
            z-index: 1;
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== Screens ===== */
        .screen {
            display: none;
            flex: 1;
            flex-direction: column;
            animation: fadeIn 0.5s ease;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
            20%, 40%, 60%, 80% { transform: translateX(4px); }
        }

        @keyframes countUp {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }

        /* ===== Cover Screen ===== */
        .cover {
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 30px;
            padding: 40px 20px;
        }

        .cover-icon {
            font-size: 80px;
            animation: pulse 2s infinite;
        }

        .cover h1 {
            font-size: 36px;
            font-weight: 900;
            background: var(--gradient-hot);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.3;
        }

        .cover h1 .en {
            display: block;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 4px;
            -webkit-text-fill-color: var(--text-secondary);
            margin-top: 8px;
        }

        .cover p {
            color: var(--text-secondary);
            font-size: 15px;
            line-height: 1.6;
        }

        .cover .warning-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 45, 85, 0.15);
            border: 1px solid rgba(255, 45, 85, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            color: var(--primary);
        }

        .cover .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .cover .stats span strong {
            color: var(--accent-orange);
            font-size: 18px;
        }

        /* ===== Age Gate ===== */
        .age-gate {
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 24px;
        }

        .age-gate .icon-18 {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--gradient-hot);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 900;
            margin: 0 auto;
        }

        .age-gate h2 {
            font-size: 24px;
            font-weight: 700;
        }

        .age-gate p {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
        }

        .age-btns {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 320px;
            margin: 0 auto;
        }

        /* ===== Buttons ===== */
        .btn {
            flex: 1;
            padding: 16px 24px;
            border-radius: 16px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--gradient-hot);
            color: white;
            box-shadow: 0 4px 20px rgba(255, 45, 85, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(255, 45, 85, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-secondary:hover {
            background: var(--bg-card-hover);
        }

        .btn-full {
            width: 100%;
            max-width: 320px;
            margin: 0 auto;
            display: block;
        }

        /* ===== Quiz Screen ===== */
        .quiz-header {
            margin-bottom: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.08);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .progress-fill {
            height: 100%;
            background: var(--gradient-hot);
            border-radius: 3px;
            transition: width 0.4s ease;
        }

        .quiz-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .quiz-meta .q-num {
            color: var(--primary);
            font-weight: 600;
        }

        .question-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 28px 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.06);
            animation: slideIn 0.4s ease;
        }

        .question-card .q-category {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 500;
            margin-bottom: 14px;
            background: rgba(191, 90, 242, 0.15);
            color: var(--accent-purple);
        }

        .question-card h3 {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.6;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
        }

        .option-btn {
            width: 100%;
            padding: 16px 20px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.08);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 400;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            line-height: 1.5;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .option-btn:hover {
            background: var(--bg-card-hover);
            border-color: rgba(255, 45, 85, 0.3);
            transform: translateX(4px);
        }

        .option-btn:active {
            transform: translateX(2px) scale(0.98);
        }

        .option-btn .opt-label {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 8px;
            background: rgba(255,255,255,0.08);
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .option-btn.selected {
            background: rgba(255, 45, 85, 0.12);
            border-color: var(--primary);
        }

        .option-btn.selected .opt-label {
            background: var(--primary);
        }

        /* ===== Loading Screen ===== */
        .loading {
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 30px;
        }

        .loading-ring {
            width: 100px;
            height: 100px;
            position: relative;
            margin: 0 auto;
        }

        .loading-ring svg {
            width: 100%;
            height: 100%;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-ring circle {
            fill: none;
            stroke-width: 4;
            stroke-linecap: round;
        }

        .loading-ring .track {
            stroke: rgba(255,255,255,0.05);
        }

        .loading-ring .progress {
            stroke: var(--primary);
            stroke-dasharray: 251;
            stroke-dashoffset: 100;
            animation: dash 2s ease-in-out infinite;
        }

        @keyframes dash {
            0% { stroke-dashoffset: 251; }
            50% { stroke-dashoffset: 50; }
            100% { stroke-dashoffset: 251; }
        }

        .loading h2 {
            font-size: 20px;
            font-weight: 600;
        }

        .loading .loading-tips {
            font-size: 13px;
            color: var(--text-secondary);
            transition: opacity 0.3s;
        }

        /* ===== Result Screen ===== */
        .result {
            align-items: center;
            text-align: center;
            padding-bottom: 40px;
        }

        .result-header {
            width: 100%;
            padding: 30px 20px;
            background: var(--bg-card);
            border-radius: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.06);
            position: relative;
            overflow: hidden;
        }

        .result-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: var(--gradient-hot);
        }

        .result-persona-icon {
            font-size: 64px;
            margin-bottom: 12px;
            animation: countUp 0.6s ease;
        }

        .result-title {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .result-persona-name {
            font-size: 28px;
            font-weight: 900;
            background: var(--gradient-hot);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }

        .result-persona-en {
            font-size: 13px;
            color: var(--text-secondary);
            letter-spacing: 2px;
            margin-bottom: 16px;
        }

        .result-score {
            display: inline-flex;
            align-items: baseline;
            gap: 4px;
            animation: countUp 0.8s ease;
        }

        .result-score .number {
            font-size: 56px;
            font-weight: 900;
            background: var(--gradient-hot);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .result-score .unit {
            font-size: 18px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .result-rarity {
            margin-top: 12px;
            padding: 6px 14px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            background: rgba(255, 159, 10, 0.12);
            color: var(--accent-orange);
            display: inline-block;
        }

        /* Radar Chart */
        .radar-section {
            width: 100%;
            background: var(--bg-card);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .radar-section h4 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .radar-chart {
            width: 240px;
            height: 240px;
            margin: 0 auto 20px;
        }

        .dimension-bars {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .dim-bar {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dim-bar .dim-name {
            font-size: 13px;
            width: 60px;
            flex-shrink: 0;
            color: var(--text-secondary);
        }

        .dim-bar .dim-track {
            flex: 1;
            height: 8px;
            background: rgba(255,255,255,0.06);
            border-radius: 4px;
            overflow: hidden;
        }

        .dim-bar .dim-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 1s ease;
        }

        .dim-bar .dim-val {
            font-size: 13px;
            font-weight: 600;
            width: 32px;
            text-align: right;
        }

        /* Description */
        .result-desc {
            width: 100%;
            background: var(--bg-card);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            text-align: left;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .result-desc h4 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .result-desc p {
            font-size: 14px;
            line-height: 1.8;
            color: var(--text-secondary);
        }

        .result-desc .highlight {
            color: var(--primary);
            font-weight: 500;
        }

        /* Share Section */
        .result-actions {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }

        .result-actions .btn {
            border-radius: 14px;
            font-size: 15px;
        }

        /* ===== Under-age Screen ===== */
        .underage {
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 20px;
        }

        .underage .icon-bye {
            font-size: 80px;
        }

        .underage h2 {
            font-size: 24px;
        }

        .underage p {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
        }

        /* ===== Share Poster (hidden, for capture) ===== */
        #poster-canvas {
            position: fixed;
            left: -9999px;
            top: 0;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(30,30,42,0.95);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 100;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ===== Responsive ===== */
        @media (max-width: 380px) {
            .cover h1 { font-size: 28px; }
            .result-score .number { font-size: 44px; }
            .question-card h3 { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <div class="container">
        <!-- ===== 1. Cover Screen ===== -->
        <div class="screen active" id="screen-cover">
            <div class="cover">
                <div class="cover-icon">🔞</div>
                <h1>
                    变态指数测试
                    <span class="en">HENTAI INDEX TEST</span>
                </h1>
                <div class="warning-badge">⚠️ 本测试仅供18岁以上成人娱乐</div>
                <p>通过 12 道精心设计的灵魂拷问<br>测出你内心深处隐藏的「变态指数」<br>你，敢直面真实的自己吗？</p>
                <div class="stats">
                    <span>🔥 <strong id="fake-count">847,362</strong> 人已测</span>
                    <span>⏱ 约 3 分钟</span>
                </div>
                <button class="btn btn-primary btn-full" onclick="showScreen('screen-age')">
                    开始测试 →
                </button>
            </div>
        </div>

        <!-- ===== 2. Age Gate ===== -->
        <div class="screen" id="screen-age">
            <div class="age-gate">
                <div class="icon-18">18+</div>
                <h2>年龄确认</h2>
                <p>本测试包含成人向内容<br>请确认你已年满18周岁</p>
                <div class="age-btns">
                    <button class="btn btn-secondary" onclick="showScreen('screen-underage')">未满18岁</button>
                    <button class="btn btn-primary" onclick="startQuiz()">已满18岁</button>
                </div>
            </div>
        </div>

        <!-- ===== 3. Under-age Screen ===== -->
        <div class="screen" id="screen-underage">
            <div class="underage">
                <div class="icon-bye">👶</div>
                <h2>小朋友请回</h2>
                <p>等你长大了再来吧～<br>现在去好好写作业！</p>
                <button class="btn btn-secondary btn-full" onclick="showScreen('screen-cover')" style="max-width:200px">乖乖回去</button>
            </div>
        </div>

        <!-- ===== 4. Quiz Screen ===== -->
        <div class="screen" id="screen-quiz">
            <div class="quiz-header">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <div class="quiz-meta">
                    <span>第 <span class="q-num" id="q-current">1</span> / <span id="q-total">12</span> 题</span>
                    <span id="q-dimension"></span>
                </div>
            </div>
            <div class="question-card" id="question-card">
                <span class="q-category" id="q-category"></span>
                <h3 id="q-text"></h3>
            </div>
            <div class="options" id="options-container"></div>
        </div>

        <!-- ===== 5. Loading Screen ===== -->
        <div class="screen" id="screen-loading">
            <div class="loading">
                <div class="loading-ring">
                    <svg viewBox="0 0 100 100">
                        <circle class="track" cx="50" cy="50" r="40"/>
                        <circle class="progress" cx="50" cy="50" r="40"/>
                    </svg>
                </div>
                <h2>正在深度分析你的变态灵魂...</h2>
                <p class="loading-tips" id="loading-tips">扫描脑内剧场中...</p>
            </div>
        </div>

        <!-- ===== 6. Result Screen ===== -->
        <div class="screen" id="screen-result">
            <div class="result">
                <div class="result-header" id="result-header">
                    <div class="result-persona-icon" id="r-icon"></div>
                    <div class="result-title">你的变态人格是</div>
                    <div class="result-persona-name" id="r-name"></div>
                    <div class="result-persona-en" id="r-en"></div>
                    <div class="result-score">
                        <span class="number" id="r-score">0</span>
                        <span class="unit">/ 100</span>
                    </div>
                    <div class="result-rarity" id="r-rarity"></div>
                </div>

                <div class="radar-section">
                    <h4>📊 五维变态图谱</h4>
                    <canvas class="radar-chart" id="radar-canvas" width="480" height="480"></canvas>
                    <div class="dimension-bars" id="dim-bars"></div>
                </div>

                <div class="result-desc" id="result-desc">
                    <h4>🔍 人格解读</h4>
                    <p id="r-desc"></p>
                </div>

                <div class="result-actions">
                    <button class="btn btn-primary" onclick="shareResult()">📤 生成分享海报</button>
                    <button class="btn btn-secondary" onclick="restart()">🔄 再测一次</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
