<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>SBTI — 像素灵魂测试</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0e17;--panel:#1a1a2e;--border:#3a3a5c;
  --green:#00e676;--yellow:#ffd740;--red:#ff5252;--cyan:#18ffff;
  --pink:#ff80ab;--purple:#b388ff;--white:#e8e8e8;--dim:#666680;
  --gold:#ffab00;
}
html,body{height:100%;background:var(--bg);color:var(--white);overflow:hidden;
  font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif}
.pf{font-family:'Press Start 2P',monospace}

/* ===== SCANLINES ===== */
body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);
  pointer-events:none;z-index:9999}

/* ===== STARS BG ===== */
#stars{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

/* ===== LAYOUT ===== */
.app{position:relative;z-index:1;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.ct{width:100%;max-width:420px;padding:16px;position:relative}

.section{display:none;flex-direction:column;align-items:center}
.section.active{display:flex;animation:pixelIn .3s steps(6)}
@keyframes pixelIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-2px)}80%{transform:translateX(2px)}}
@keyframes flash{0%{opacity:1}100%{opacity:0}}
@keyframes typewriter{from{width:0}to{width:100%}}

/* ===== PIXEL BOX ===== */
.pbox{background:var(--panel);border:3px solid var(--border);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.05), 4px 4px 0 0 rgba(0,0,0,.4);
  position:relative}
.pbox::before{content:'';position:absolute;top:-1px;left:-1px;right:-1px;height:2px;background:rgba(255,255,255,.1)}

/* ===== LANDING ===== */
.l-stars{font-size:10px;color:var(--yellow);margin-bottom:10px;letter-spacing:4px}
.l-title{font-size:48px;font-weight:900;letter-spacing:4px;color:var(--green);
  text-shadow:0 0 20px rgba(0,230,118,.4),4px 4px 0 rgba(0,0,0,.5);margin-bottom:4px}
.l-sub{font-size:8px;color:var(--cyan);letter-spacing:2px;margin-bottom:24px}
.l-desc{font-size:13px;color:var(--dim);margin-bottom:32px;text-align:center;line-height:1.8}
.l-desc em{color:var(--yellow);font-style:normal}

.btn-start{padding:14px 40px;background:transparent;border:3px solid var(--green);
  color:var(--green);font-size:14px;font-weight:700;cursor:pointer;letter-spacing:2px;
  box-shadow:4px 4px 0 0 rgba(0,230,118,.3);transition:all .15s;position:relative;overflow:hidden}
.btn-start:hover{background:var(--green);color:var(--bg);box-shadow:2px 2px 0 0 rgba(0,230,118,.5)}
.btn-start:active{transform:translate(2px,2px);box-shadow:none}
.btn-start .cursor{animation:blink 1s step-start infinite}

.l-chars{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap;justify-content:center}
.l-char{width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  font-size:18px;background:var(--panel);border:2px solid var(--border);animation:float 2s ease infinite;animation-delay:calc(var(--d)*0.2s)}

.l-badge{margin-top:16px;font-size:10px;color:var(--dim);letter-spacing:1px}
.l-badge span{color:var(--gold)}

/* ===== QUIZ ===== */
.q-top{width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.q-back{background:none;border:none;color:var(--dim);font-size:13px;cursor:pointer;
  padding:6px 10px;transition:color .2s;display:flex;align-items:center;gap:4px;min-width:72px}
.q-back:hover{color:var(--cyan)}
.q-back.hidden{visibility:hidden}
.q-back .arr{font-size:10px}
.q-level{font-size:10px;color:var(--yellow);letter-spacing:1px}

/* HP Bar */
.hp-wrap{width:100%;margin-bottom:16px}
.hp-label{display:flex;justify-content:space-between;font-size:10px;margin-bottom:6px}
.hp-label-l{color:var(--green)}
.hp-label-r{color:var(--dim)}
.hp-bar{width:100%;height:14px;background:#111;border:2px solid var(--border);position:relative;overflow:hidden}
.hp-fill{height:100%;transition:width .4s steps(10);position:relative}
.hp-fill.seg1{background:var(--red)}
.hp-fill.seg2{background:var(--yellow)}
.hp-fill.seg3{background:var(--green)}
.hp-bar-shine{position:absolute;top:0;left:0;right:0;height:40%;background:rgba(255,255,255,.15)}

/* Question Card */
.q-card{width:100%;padding:20px 18px 22px}
.q-header{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.q-num{font-size:10px;color:var(--green);letter-spacing:1px}
.q-dim-tag{padding:2px 8px;font-size:10px;background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.2);color:var(--green)}
.q-text{font-size:17px;font-weight:700;line-height:1.7;margin-bottom:22px;min-height:56px}

/* Options */
.opts{display:flex;flex-direction:column;gap:10px}
.opt{padding:14px 16px;border:2px solid var(--border);background:rgba(255,255,255,.02);
  cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:10px;position:relative}
.opt::before{content:'▸';color:var(--dim);font-size:12px;opacity:0;transition:opacity .15s;margin-top:2px;flex-shrink:0}
.opt:hover{border-color:var(--green);background:rgba(0,230,118,.05);transform:translateX(4px)}
.opt:hover::before{opacity:1;color:var(--green)}
.opt:active{transform:translateX(2px) scale(.98)}
.opt.selected{border-color:var(--green);background:rgba(0,230,118,.1)}
.opt.selected::before{opacity:1;color:var(--green)}
.opt-key{min-width:26px;height:26px;display:flex;align-items:center;justify-content:center;
  border:2px solid var(--border);font-size:11px;font-weight:700;flex-shrink:0;color:var(--dim);
  font-family:'Press Start 2P',monospace}
.opt.selected .opt-key{border-color:var(--green);color:var(--green);background:rgba(0,230,118,.1)}
.opt-text{font-size:14px;line-height:1.5;padding-top:2px}

/* ===== LOADING ===== */
.ld-wrap{text-align:center;width:100%}
.ld-emoji{font-size:56px;animation:float 1.5s ease infinite}
.ld-title{font-size:14px;color:var(--green);margin-top:20px;letter-spacing:2px}
.ld-bar-wrap{width:80%;max-width:280px;margin:20px auto 0}
.ld-bar{height:16px;background:#111;border:2px solid var(--border);overflow:hidden;position:relative}
.ld-bar-fill{height:100%;width:0;background:var(--green);transition:width .8s steps(20);position:relative}
.ld-bar-fill::after{content:'';position:absolute;top:0;left:0;right:0;height:40%;background:rgba(255,255,255,.2)}
.ld-pct{font-size:10px;color:var(--dim);margin-top:8px;letter-spacing:1px}
.ld-tip{font-size:11px;color:var(--dim);margin-top:16px;opacity:.6}

/* ===== RESULT ===== */
.r-wrap{width:100%;text-align:center;overflow-y:auto;max-height:calc(100vh - 32px);padding-bottom:40px;scrollbar-width:none;-ms-overflow-style:none}
.r-wrap::-webkit-scrollbar{display:none}

/* Achievement banner */
.r-achieve{padding:10px 0;margin-bottom:14px}
.r-achieve-text{font-size:10px;color:var(--gold);letter-spacing:2px;animation:blink 2s step-start infinite}

/* Main result card */
.r-card{padding:28px 22px;margin-bottom:14px;text-align:center}
.r-label{font-size:12px;color:var(--dim);margin-bottom:16px}
.r-emoji{font-size:64px;display:block;margin-bottom:10px}
.r-name{font-size:32px;font-weight:900;color:var(--white);margin-bottom:4px}
.r-code{font-size:20px;font-weight:900;color:var(--green);letter-spacing:4px;
  text-shadow:0 0 10px rgba(0,230,118,.4);margin-bottom:14px}
.r-line{width:40px;height:3px;background:var(--green);margin:0 auto 14px}
.r-tagline{font-size:12px;color:var(--yellow);margin-bottom:18px}
.r-desc{font-size:13px;line-height:1.9;color:#aaa;text-align:left}

.r-tags{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:16px}
.r-tag{padding:3px 10px;font-size:10px;border:1px solid var(--green);color:var(--green);background:rgba(0,230,118,.06)}

/* Radar & dims */
.r-dark{padding:20px 16px;margin-bottom:14px}
.r-dark-title{font-size:11px;color:var(--dim);margin-bottom:10px;letter-spacing:1px}
.r-dim-tags{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.dt{padding:4px 10px;font-size:10px;font-weight:500}
.dt.h{border:1px solid rgba(0,230,118,.3);color:var(--green);background:rgba(0,230,118,.08)}
.dt.m{border:1px solid rgba(255,215,64,.3);color:var(--yellow);background:rgba(255,215,64,.08)}
.dt.l{border:1px solid rgba(24,255,255,.3);color:var(--cyan);background:rgba(24,255,255,.08)}

/* Buttons */
.r-btns{display:flex;gap:10px;justify-content:center;margin-top:10px}
.btn-r{padding:12px 24px;border:2px solid;font-size:12px;font-weight:700;cursor:pointer;
  letter-spacing:1px;background:transparent;transition:all .15s;box-shadow:3px 3px 0 0 rgba(0,0,0,.3)}
.btn-r:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 0 rgba(0,0,0,.4)}
.btn-r:active{transform:translate(2px,2px);box-shadow:none}
.btn-r.p{border-color:var(--green);color:var(--green)}
.btn-r.p:hover{background:var(--green);color:var(--bg)}
.btn-r.s{border-color:var(--dim);color:var(--dim)}
.btn-r.s:hover{border-color:var(--cyan);color:var(--cyan)}

/* Screen flash */
.flash{position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;pointer-events:none;z-index:200;animation:flash .4s ease forwards}

#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100}

/* Mobile */
@media(max-width:420px){
  .ct{padding:12px}
  .l-title{font-size:40px}
  .q-card{padding:16px 14px 18px}
  .q-text{font-size:15px}
  .opt{padding:12px 14px}
  .opt-text{font-size:13px}
  .r-name{font-size:26px}
  .r-code{font-size:18px}
  .r-emoji{font-size:52px}
}
@media(max-width:360px){
  .l-title{font-size:34px}
  .btn-start{padding:12px 30px;font-size:12px}
}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<canvas id="confetti-canvas"></canvas>

<div class="app">
<div class="ct">

  <!-- ===== LANDING ===== -->
  <div id="sec-landing" class="section active">
    <div class="l-stars pf">★ ★ ★ ★ ★</div>
    <div class="l-title">SBTI</div>
    <div class="l-sub pf">SILLY BIG PERSONALITY TEST</div>
    <div class="l-desc">
      <em>15</em> 道灵魂拷问 · <em>2</em> 分钟 · <em>25</em> 种人格<br>
      MBTI已过时，SBTI才是版本答案
    </div>
    <button class="btn-start" onclick="startQuiz()">
      <span class="cursor">▶</span> 开 始 测 试
    </button>
    <div class="l-chars">
      <div class="l-char" style="--d:0">⚰️</div>
      <div class="l-char" style="--d:1">👔</div>
      <div class="l-char" style="--d:2">🐒</div>
      <div class="l-char" style="--d:3">😴</div>
      <div class="l-char" style="--d:4">💃</div>
      <div class="l-char" style="--d:5">🤔</div>
      <div class="l-char" style="--d:6">🏃</div>
      <div class="l-char" style="--d:7">🍺</div>
      <div class="l-char" style="--d:8">💩</div>
      <div class="l-char" style="--d:9">🎭</div>
    </div>
    <div class="l-badge">🎮 已有 <span>2,847,293</span> 人通关</div>
  </div>

  <!-- ===== QUIZ ===== -->
  <div id="sec-quiz" class="section">
    <div class="q-top">
      <button class="q-back hidden" id="btn-back" onclick="goBack()">
        <span class="arr pf">◄</span> 上一题
      </button>
      <div class="q-level pf" id="q-level">LEVEL 01/15</div>
    </div>
    <div class="hp-wrap">
      <div class="hp-label">
        <span class="hp-label-l pf" id="hp-left">EXP</span>
        <span class="hp-label-r pf" id="hp-right">0%</span>
      </div>
      <div class="hp-bar">
        <div class="hp-fill seg3" id="hp-fill" style="width:0%">
          <div class="hp-bar-shine"></div>
        </div>
      </div>
    </div>
    <div class="q-card pbox" id="q-card">
      <div class="q-header">
        <span class="q-num pf" id="q-num">Q01</span>
        <span class="q-dim-tag" id="q-dim"></span>
      </div>
      <div class="q-text" id="q-text"></div>
      <div class="opts" id="q-opts"></div>
    </div>
  </div>

  <!-- ===== LOADING ===== -->
  <div id="sec-loading" class="section">
    <div class="ld-wrap">
      <div class="ld-emoji">🔮</div>
      <div class="ld-title pf">ANALYZING...</div>
      <div class="ld-bar-wrap">
        <div class="ld-bar"><div class="ld-bar-fill" id="ld-fill"></div></div>
      </div>
      <div class="ld-pct pf" id="ld-pct">0%</div>
      <div class="ld-tip">正在扫描你的灵魂数据</div>
    </div>
  </div>

  <!-- ===== RESULT ===== -->
  <div id="sec-result" class="section">
    <div class="r-wrap" id="r-wrap"></div>
  </div>

</div>
</div>

<script>

const DIM_NAMES=['自尊自信','自我清晰度','核心价值观','依恋安全感','情感投入度','边界与独立','世界观倾向','规则与灵活','人生意义感','动机取向','决策风格','执行模式','社交主动性','人际边界','表达与真实'];

/* ==================== STATE ==================== */
let curQ=0, ans=new Array(15).fill(-1);

/* ==================== STARS BG ==================== */
(function(){
  const c=document.getElementById('stars'),x=c.getContext('2d');
  let w,h,stars=[];
  function rs(){w=c.width=innerWidth;h=c.height=innerHeight;stars=[];
    for(let i=0;i<80;i++)stars.push({x:Math.random()*w,y:Math.random()*h,s:Math.random()*1.5+.5,sp:Math.random()*.3+.1,a:Math.random()})}
  addEventListener('resize',rs);rs();
  (function d(){
    x.fillStyle='#0f0e17';x.fillRect(0,0,w,h);
    stars.forEach(s=>{s.a+=.01;
      const al=Math.abs(Math.sin(s.a))*.6+.2;
      x.fillStyle=`rgba(255,255,255,${al})`;x.fillRect(Math.round(s.x),Math.round(s.y),Math.ceil(s.s),Math.ceil(s.s));
      s.y+=s.sp;if(s.y>h){s.y=0;s.x=Math.random()*w}});
    requestAnimationFrame(d);
  })();
})();

/* ==================== NAV ==================== */
function show(id){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById('sec-'+id).classList.add('active')}

function startQuiz(){curQ=0;ans.fill(-1);show('quiz');renderQ()}

/* ==================== QUIZ ==================== */
function renderQ(){
  const q=questions[curQ], pct=Math.round((curQ/15)*100);
  // Back button
  document.getElementById('btn-back').className=curQ>0?'q-back':'q-back hidden';
  // Level
  document.getElementById('q-level').textContent=`LEVEL ${String(curQ+1).padStart(2,'0')}/15`;
  // HP bar
  document.getElementById('hp-right').textContent=pct+'%';
  const fill=document.getElementById('hp-fill');
  fill.style.width=pct+'%';
  fill.className='hp-fill '+(pct<33?'seg1':pct<66?'seg2':'seg3');
  // Card
  const card=document.getElementById('q-card');card.style.animation='none';card.offsetHeight;card.style.animation='pixelIn .3s steps(6)';
  document.getElementById('q-num').textContent='Q'+String(curQ+1).padStart(2,'0');
  document.getElementById('q-dim').textContent=MODEL_EMOJI[Math.floor(curQ/3)]+' '+q.model+' · '+DIM_NAMES[curQ];
  document.getElementById('q-text').textContent=q.text;
  
  const ow=document.getElementById('q-opts');ow.innerHTML='';
  ['A','B','C'].forEach((l,i)=>{
    const d=document.createElement('div');
    d.className='opt'+(ans[curQ]===q.opts[i].s?' selected':'');
    d.innerHTML=`<span class="opt-key">${l}</span><span class="opt-text">${q.opts[i].t}</span>`;
    d.onclick=()=>pick(i,q.opts[i].s,d);
    ow.appendChild(d);
  });
}

function pick(idx,score,el){
  document.querySelectorAll('.opt').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
  ans[curQ]=score;
  
  setTimeout(()=>{
    if(curQ<14){curQ++;renderQ()}
    else{show('loading');startLoading()}
  },350);
}

function goBack(){
  if(curQ>0){curQ--;renderQ()}
}

/* ==================== LOADING ==================== */
function startLoading(){
  let p=0;const fill=document.getElementById('ld-fill'),pct=document.getElementById('ld-pct');
  fill.style.width='0%';
  const iv=setInterval(()=>{
    p+=Math.random()*12+3;if(p>100)p=100;
    fill.style.width=p+'%';pct.textContent=Math.round(p)+'%';
    if(p>=100){clearInterval(iv);setTimeout(showResult,400)}
  },200);
}

/* ==================== SCORING ==================== */
function compute(){
  if(ans[6]===0&&ans[8]===0&&ans[9]===0&&ans[11]===0&&ans[7]===2) return types.find(t=>t.code==='DRUN-K');
  let best=types[0],bd=Infinity;
  types.forEach(t=>{if(t.code==='DRUN-K')return;let d=0;for(let i=0;i<15;i++)d+=Math.abs(ans[i]-t.vec[i]);if(d<bd){bd=d;best=t}});
  return best;
}

/* ==================== RESULT ==================== */
function showResult(){
  const t=compute();show('result');
  // Flash
  const fl=document.createElement('div');fl.className='flash';document.body.appendChild(fl);setTimeout(()=>fl.remove(),500);
  fireConfetti();
  
  const ms=[];for(let m=0;m<5;m++)ms.push(Math.round((ans[m*3]+ans[m*3+1]+ans[m*3+2])/6*100));
  const da=ans.map((a,i)=>({n:DIM_NAMES[i],c:a>=2?'h':a>=1?'m':'l',t:a>=2?'高':a>=1?'中':'低'}));
  
  document.getElementById('r-wrap').innerHTML=`

/* ==================== RADAR ==================== */
function drawRadar(sc){
  const cv=document.getElementById('radar');if(!cv)return;
  const c=cv.getContext('2d'),dp=devicePixelRatio||1;
  cv.width=280*dp;cv.height=280*dp;cv.style.width='280px';cv.style.height='280px';c.scale(dp,dp);
  const cx=140,cy=140,R=95,N=5,st=Math.PI*2/N,sa=-Math.PI/2;
  // Grid
  for(let r=1;r<=4;r++){const rr=R*r/4;c.beginPath();for(let i=0;i<=N;i++){const a=sa+i*st,x=cx+rr*Math.cos(a),y=cy+rr*Math.sin(a);i?c.lineTo(x,y):c.moveTo(x,y)}c.strokeStyle='rgba(255,255,255,.06)';c.lineWidth=1;c.stroke()}
  // Axes
  for(let i=0;i<N;i++){const a=sa+i*st;c.beginPath();c.moveTo(cx,cy);c.lineTo(cx+R*Math.cos(a),cy+R*Math.sin(a));c.strokeStyle='rgba(255,255,255,.04)';c.stroke()}
  // Data - draw with steps to look pixely
  c.beginPath();sc.forEach((s,i)=>{const r=R*s/100,a=sa+i*st,x=cx+r*Math.cos(a),y=cy+r*Math.sin(a);i?c.lineTo(x,y):c.moveTo(x,y)});c.closePath();
  c.fillStyle='rgba(0,230,118,.15)';c.fill();c.strokeStyle='rgba(0,230,118,.8)';c.lineWidth=2;c.stroke();
  // Dots & labels
  sc.forEach((s,i)=>{const r=R*s/100,a=sa+i*st,x=cx+r*Math.cos(a),y=cy+r*Math.sin(a);
    c.fillStyle='#00e676';c.fillRect(x-3,y-3,6,6);// pixel dot
    const lx=cx+(R+20)*Math.cos(a),ly=cy+(R+20)*Math.sin(a);
    c.fillStyle='#666680';c.font='11px sans-serif';c.textAlign='center';c.textBaseline='middle';
    c.fillText(MODEL_EMOJI[i]+MODEL_NAMES[i],lx,ly);
    const sx=cx+(R+36)*Math.cos(a),sy=cy+(R+36)*Math.sin(a);
    c.fillStyle='#00e676';c.font='bold 10px monospace';c.fillText(s+'%',sx,sy);
  });
}

/* ==================== CONFETTI ==================== */
function fireConfetti(){
  const cv=document.getElementById('confetti-canvas'),c=cv.getContext('2d');
  cv.width=innerWidth;cv.height=innerHeight;
  const cols=['#00e676','#ffd740','#ff5252','#18ffff','#ff80ab','#b388ff'];
  let ps=[];for(let i=0;i<100;i++)ps.push({x:Math.random()*cv.width,y:-20-Math.random()*200,
    w:Math.random()*6+4,h:Math.random()*4+3,c:cols[~~(Math.random()*cols.length)],
    dx:(Math.random()-.5)*4,dy:Math.random()*3+2,life:1});
  let f=0;
  (function d(){
    c.clearRect(0,0,cv.width,cv.height);
    ps.forEach(p=>{p.x+=p.dx;p.y+=p.dy;p.dy+=.04;p.life-=.004;if(p.life<=0)return;
      c.globalAlpha=p.life;c.fillStyle=p.c;c.fillRect(Math.round(p.x),Math.round(p.y),p.w,p.h)});// pixel confetti - no rotation, square
    c.globalAlpha=1;ps=ps.filter(p=>p.life>0);
    if(ps.length&&f<400){f++;requestAnimationFrame(d)}else c.clearRect(0,0,cv.width,cv.height);
  })();
}

/* ==================== SHARE ==================== */
function shareR(code,name,tag){
  const t=`🎮 我的SBTI人格是【${code} · ${name}】\n「${tag}」\n\n★ ACHIEVEMENT UNLOCKED ★\n来测测你是什么人格 👉`;
  if(navigator.clipboard){navigator.clipboard.writeText(t).then(()=>alert('✅ 战绩已复制，快去分享！')).catch(()=>prompt('复制分享：',t))}else prompt('复制分享：',t);
}

// Keyboard support
document.addEventListener('keydown',e=>{
  if(!document.getElementById('sec-quiz').classList.contains('active'))return;
  if(e.key==='a'||e.key==='A'||e.key==='1'){const o=document.querySelectorAll('.opt');if(o[0])o[0].click()}
  if(e.key==='b'||e.key==='B'||e.key==='2'){const o=document.querySelectorAll('.opt');if(o[1])o[1].click()}
  if(e.key==='c'||e.key==='C'||e.key==='3'){const o=document.querySelectorAll('.opt');if(o[2])o[2].click()}
  if(e.key==='Backspace'||e.key==='ArrowLeft')goBack();
});
