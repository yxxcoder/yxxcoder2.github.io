<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>宝宝快跑！抓不到你算我输</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;overflow:hidden;touch-action:manipulation}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#8BC34A;background:linear-gradient(180deg,#7CB342 0%,#558B2F 100%)}

/* 开始界面 */
#start-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#FF6F00 0%,#E65100 100%);z-index:100;gap:20px}
#start-screen h1{font-size:clamp(28px,8vw,48px);color:#FFF;text-shadow:3px 3px 0 #BF360C;letter-spacing:4px}
#start-screen .subtitle{font-size:clamp(14px,4vw,20px);color:#FFECB3;margin-top:-10px}
.start-face{width:clamp(80px,25vw,120px);height:clamp(80px,25vw,120px);border-radius:50%;border:4px solid #FFF;object-fit:cover;animation:bounce 1s ease-in-out infinite alternate}
.start-faces{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;padding:0 20px}
@keyframes bounce{0%{transform:translateY(0)}100%{transform:translateY(-15px)}}
.start-faces img:nth-child(2){animation-delay:.2s}
.start-faces img:nth-child(3){animation-delay:.4s}
.start-faces img:nth-child(4){animation-delay:.6s}
.start-faces img:nth-child(5){animation-delay:.8s}
#start-btn{margin-top:10px;padding:16px 48px;font-size:clamp(18px,5vw,26px);font-weight:bold;color:#E65100;background:#FFEB3B;border:none;border-radius:50px;box-shadow:0 6px 0 #F9A825,0 8px 20px rgba(0,0,0,.3);cursor:pointer;letter-spacing:2px;transition:transform .1s}
#start-btn:active{transform:translateY(4px);box-shadow:0 2px 0 #F9A825}

/* 游戏主界面 */
#game-screen{display:none;width:100%;height:100%;flex-direction:column}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:rgba(0,0,0,.2);color:#FFF;font-size:clamp(14px,4vw,18px);font-weight:bold;flex-shrink:0}
.top-bar span{display:flex;align-items:center;gap:4px}

/* 游戏区域 */
.game-area{flex:1;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:clamp(8px,2vw,16px);padding:clamp(8px,2vw,16px);align-content:center;max-width:500px;margin:0 auto;width:100%}

/* 地洞 */
.hole{position:relative;display:flex;align-items:flex-end;justify-content:center;overflow:hidden;border-radius:12px}
.hole-bg{position:absolute;bottom:0;width:90%;height:40%;background:radial-gradient(ellipse at center,#5D4037 0%,#3E2723 100%);border-radius:50%;z-index:1}

/* 地鼠（女友头像） */
.mole{position:absolute;bottom:-100%;width:clamp(60px,18vw,90px);height:clamp(60px,18vw,90px);border-radius:50%;border:3px solid #FFF;object-fit:cover;z-index:2;transition:bottom .2s ease-out;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.4)}
.mole.active{bottom:15%}
.mole.hit{filter:grayscale(1) brightness(1.5);transform:scale(.8) rotate(15deg);transition:all .15s}

/* 锤子效果 */
.hammer{position:fixed;width:clamp(50px,14vw,70px);height:clamp(50px,14vw,70px);pointer-events:none;z-index:999;transform:translate(-50%,-50%) rotate(-30deg);transition:transform .08s;display:none}
.hammer.smash{transform:translate(-50%,-50%) rotate(15deg) scale(1.1)}

/* 打击特效 */
.hit-effect{position:fixed;pointer-events:none;z-index:998;font-size:clamp(24px,7vw,36px);font-weight:bold;animation:hitPop .6s ease-out forwards}
@keyframes hitPop{0%{opacity:1;transform:translate(-50%,-50%) scale(.5)}50%{opacity:1;transform:translate(-50%,-80%) scale(1.2)}100%{opacity:0;transform:translate(-50%,-120%) scale(.8)}}

/* 结算界面 */
#result-screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.85);z-index:200;gap:16px;padding:20px}
#result-screen h2{font-size:clamp(24px,7vw,40px);color:#FFEB3B;text-shadow:2px 2px 0 #E65100}
.result-stats{color:#FFF;font-size:clamp(16px,4.5vw,22px);text-align:center;line-height:1.8}
.result-comment{color:#FF8A65;font-size:clamp(14px,4vw,18px);text-align:center;padding:0 20px;margin-top:8px}
#result-face{width:clamp(80px,25vw,120px);height:clamp(80px,25vw,120px);border-radius:50%;border:4px solid #FFEB3B;object-fit:cover}
#restart-btn{margin-top:10px;padding:14px 40px;font-size:clamp(16px,4.5vw,22px);font-weight:bold;color:#FFF;background:#FF5722;border:none;border-radius:50px;box-shadow:0 4px 0 #BF360C;cursor:pointer;letter-spacing:2px}
#restart-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #BF360C}

/* combo */
.combo{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(36px,10vw,60px);font-weight:bold;color:#FF1744;text-shadow:2px 2px 0 #000;pointer-events:none;z-index:500;animation:comboAnim .8s ease-out forwards;display:none}
@keyframes comboAnim{0%{opacity:1;transform:translate(-50%,-50%) scale(.3)}40%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}100%{opacity:0;transform:translate(-50%,-70%) scale(1)}}
</style>
</head>

];

const HIT_WORDS=["啪！","哎呀！","别打了！","疼！","呜呜~","救命！","你完了！","讨厌！","好痛！","哼！"];
const COMBO_WORDS=["双杀！","三连击！","超神！","无人能挡！","绝世暴击！"];
const TAUNTS=["来打我呀~","打不到我~","嘻嘻~","略略略~","就不让你打到~"];

let score=0, combo=0, maxCombo=0, hits=0, misses=0, totalMoles=0;
let gameTimer=null, moleTimer=null, timeLeft=15;
let isPlaying=false;

// 初始化9个洞
const area=document.getElementById('game-area');
for(let i=0;i<9;i++){
  const hole=document.createElement('div');
  hole.className='hole';
  hole.innerHTML=`<div class="hole-bg"></div><img class="mole" data-idx="${i}" src="${FACES[i%5]}">`;
  area.appendChild(hole);
}

const moles=document.querySelectorAll('.mole');
const hammer=document.getElementById('hammer');

// 锤子跟随
let hammerVisible=false;
function showHammer(x,y){
  hammer.style.display='block';
  hammer.style.left=x+'px';
  hammer.style.top=y+'px';
  hammerVisible=true;
}
function smashHammer(){
  hammer.classList.add('smash');
  setTimeout(()=>hammer.classList.remove('smash'),100);
}

document.addEventListener('touchmove',e=>{
  if(hammerVisible){
    const t=e.touches[0];
    hammer.style.left=t.clientX+'px';
    hammer.style.top=t.clientY+'px';
  }
},{passive:true});

// 打击特效
function spawnHitEffect(x,y,text,color){
  const el=document.createElement('div');
  el.className='hit-effect';
  el.textContent=text;
  el.style.left=x+'px';
  el.style.top=y+'px';
  el.style.color=color||'#FFEB3B';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),700);
}

// combo 提示
function showCombo(c){
  const el=document.getElementById('combo-text');
  const word=c>=6?'毁天灭地！':COMBO_WORDS[Math.min(c-2,COMBO_WORDS.length-1)];
  el.textContent=c+'连击！'+word;
  el.style.display='block';
  el.style.animation='none';
  el.offsetHeight;
  el.style.animation='comboAnim .8s ease-out forwards';
  setTimeout(()=>el.style.display='none',900);
}

// 嘲讽气泡
function showTaunt(moleEl){
  const rect=moleEl.getBoundingClientRect();
  const el=document.createElement('div');
  el.className='hit-effect';
  el.textContent=TAUNTS[Math.floor(Math.random()*TAUNTS.length)];
  el.style.left=(rect.left+rect.width/2)+'px';
  el.style.top=rect.top+'px';
  el.style.color='#FFF';
  el.style.fontSize='clamp(12px,3.5vw,16px)';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),700);
}

// 点击地鼠
function hitMole(e){
  if(!isPlaying)return;
  e.preventDefault();
  const mole=e.currentTarget;
  if(!mole.classList.contains('active')||mole.classList.contains('hit'))return;

  const touch=e.touches?e.touches[0]:e;
  showHammer(touch.clientX,touch.clientY);
  smashHammer();

  mole.classList.add('hit');
  hits++;
  combo++;
  if(combo>maxCombo)maxCombo=combo;

  // 分数：连击加成
  const pts=10+Math.min(combo*5,50);
  score+=pts;
  document.getElementById('score').textContent=score;
  document.getElementById('combo-count').textContent=combo;

  // 特效
  const word=HIT_WORDS[Math.floor(Math.random()*HIT_WORDS.length)];
  spawnHitEffect(touch.clientX,touch.clientY,word+' +'+pts,'#FFEB3B');

  if(combo>=2)showCombo(combo);

  // 震动
  if(navigator.vibrate)navigator.vibrate(50);

  setTimeout(()=>{
    mole.classList.remove('active','hit');
    mole.src=FACES[Math.floor(Math.random()*5)];
  },200);
}

moles.forEach(m=>{
  m.addEventListener('touchstart',hitMole,{passive:false});
  m.addEventListener('mousedown',hitMole);
});

// 点击空白 = miss
area.addEventListener('touchstart',e=>{
  if(!isPlaying)return;
  if(!e.target.classList.contains('mole')){
    const t=e.touches[0];
    showHammer(t.clientX,t.clientY);
    smashHammer();
    combo=0;
    document.getElementById('combo-count').textContent=0;
  }
},{passive:true});

// 出现地鼠
let activeMoles=new Set();
function popMole(){
  if(!isPlaying)return;
  // 随机选一个没激活的洞
  const inactive=[...moles].filter(m=>!m.classList.contains('active'));
  if(inactive.length===0)return;
  const mole=inactive[Math.floor(Math.random()*inactive.length)];
  mole.src=FACES[Math.floor(Math.random()*5)];
  mole.classList.add('active');
  totalMoles++;

  // 随机显示嘲讽
  if(Math.random()<0.3)setTimeout(()=>{if(mole.classList.contains('active'))showTaunt(mole)},300);

  // 自动消失
  const stayTime=800+Math.random()*1200-Math.min(score/2,400);
  setTimeout(()=>{
    if(mole.classList.contains('active')&&!mole.classList.contains('hit')){
      mole.classList.remove('active');
      misses++;
      combo=0;
      document.getElementById('combo-count').textContent=0;
    }
  },Math.max(stayTime,400));
}

function startMoleLoop(){
  const interval=()=>{
    if(!isPlaying)return;
    popMole();
    // 随机同时出多个
    if(Math.random()<0.3+score/500)popMole();
    if(score>200&&Math.random()<0.2)popMole();
    const delay=400+Math.random()*600-Math.min(score/3,200);
    moleTimer=setTimeout(interval,Math.max(delay,250));
  };
  interval();
}

// 倒计时
function startTimer(){
  timeLeft=15;
  document.getElementById('timer').textContent=timeLeft;
  gameTimer=setInterval(()=>{
    timeLeft--;
    document.getElementById('timer').textContent=timeLeft;
    if(timeLeft<=0)endGame();
  },1000);
}

// 开始游戏
function startGame(){
  score=0;combo=0;maxCombo=0;hits=0;misses=0;totalMoles=0;
  document.getElementById('score').textContent=0;
  document.getElementById('combo-count').textContent=0;
  document.getElementById('start-screen').style.display='none';
  document.getElementById('result-screen').style.display='none';
  document.getElementById('game-screen').style.display='flex';
  isPlaying=true;
  startTimer();
  startMoleLoop();
}

// 结束游戏
function endGame(){
  isPlaying=false;
  clearInterval(gameTimer);
  clearTimeout(moleTimer);
  hammer.style.display='none';
  moles.forEach(m=>m.classList.remove('active','hit'));

  const accuracy=totalMoles>0?Math.round(hits/totalMoles*100):0;
  const face=FACES[Math.floor(Math.random()*5)];

  let title,comment;
  if(score>=500){
    title='手速逆天！';
    comment='你是不是背着我偷偷练过？这么能打，今晚你洗碗';
  }else if(score>=300){
    title='有点厉害哦~';
    comment='打自己打得这么开心，你是不是有点变态？';
  }else if(score>=150){
    title='一般般啦~';
    comment='就这反应速度？怪不得每次抢红包都抢不到';
  }else if(score>=50){
    title='小笨蛋～';
    comment='这都打不中几个...你是不是舍不得打呀？';
  }else{
    title='哈哈哈废了！';
    comment='连自己都打不过，你还能干啥？乖乖给我买奶茶去';
  }

  document.getElementById('result-face').src=face;
  document.getElementById('result-title').textContent=title;
  document.getElementById('result-stats').innerHTML=
    `得分：${score} 分<br>命中：${hits} / ${totalMoles}<br>命中率：${accuracy}%<br>最高连击：${maxCombo}`;
  document.getElementById('result-comment').textContent=comment;
  document.getElementById('result-screen').style.display='flex';
}

document.getElementById('start-btn').addEventListener('click',startGame);
document.getElementById('restart-btn').addEventListener('click',startGame);

// 防止页面滚动
document.addEventListener('touchmove',e=>{
  if(isPlaying)e.preventDefault();
},{passive:false});
</script>
</body>
